<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Star</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <div id="header"></div>

  <main class="main-with-sidenav">
    <!-- 左侧导航栏 -->
    

    <div class="main-content">
      <section class="hero">
        <div class="hero-content">
          <img src="img/welcome.jpeg" alt="示例动图" width="700" height="400" />
          <h1>全新视角</h1>
          <p>来人间一趟，定要发光发亮</p>
          <a href="#" class="cta-link">了解更多 <i class="fas fa-chevron-right"></i></a>
        </div>
      </section>

      

      <section class="innovation-section">
        <h2>前端科技与发展</h2>
        <div class="card-container">
          <div class="card">
            <div class="logo"><a href="#" class="logo-link"><h3>人工智能研究</h3></a></div>
            <p class="desc">我们将会逐步开发我们的AI模型Jason</p>
          </div>
          <div class="card">
            <div class="logo"><a href="#" class="logo-link"><h3>新系统</h3></a></div>
            <p class="desc">Atlas将会是下一代操作系统，他不像Windows那样复杂，也不像MacOS那样臃肿...</p>
          </div>
        </div>
      </section>
    </div>

    <!-- 右侧导航栏 -->
    
  </main>

  <div id="footer"></div>

  <script src="component-loader.js"></script>
</body>
</html>
